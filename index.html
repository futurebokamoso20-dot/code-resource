<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeHub - Free Copy-Paste Code Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔥 CodeHub</h1>
            <p class="tagline">Free Copy-Paste Code Library for Beginners</p>
            <p class="subtitle">Grab ready-to-use code snippets and start creating!</p>
        </header>

        <!-- Search Bar -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Search codes (e.g., heart, logo, animation...)">
        </div>

        <!-- Category Filter -->
        <div class="category-filter">
            <button class="filter-btn active" data-category="all">All Codes</button>
            <button class="filter-btn" data-category="heart">❤️ Heart</button>
            <button class="filter-btn" data-category="logo">🎨 Logos</button>
            <button class="filter-btn" data-category="animation">✨ Animations</button>
        </div>
        
        <div id="codeGallery" class="gallery">
            <!-- Codes will be loaded here -->
        </div>

        <footer>
            <p>Are you a creator? <a href="mailto:futurebokamoso20@gmail.com?subject=I want my own code page">Get your FREE Copy-Paste page here.</a></p>
            <p class="copyright">© 2026 CodeHub - Made for learners</p>
        </footer>
    </div>
    <script src="script.js"></script>
    
    <!-- Visitor Tracker -->
    <script data-goatcounter="https://futurebokamoso20.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
